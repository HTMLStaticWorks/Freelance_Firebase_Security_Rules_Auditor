<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | FireAudit</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: { bg: '#0a0a0f', surface: '#12121a' },
                        neon: { blue: '#00f0ff', emerald: '#00ff66', purple: '#b026ff' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-bg text-gray-200 min-h-screen">
    <div class="absolute top-6 right-6 z-50 flex items-center space-x-4">
        <button class="theme-toggle w-10 h-10 rounded-full flex items-center justify-center glass border border-white/10 hover:bg-white/10 transition-colors text-yellow-400">
            <i class="fa-solid fa-sun"></i>
        </button>
        <button class="rtl-toggle w-10 h-10 rounded-full flex items-center justify-center glass border border-white/10 hover:bg-white/10 transition-colors text-gray-300">
            <span class="text-[10px] font-bold">RTL</span>
        </button>
    </div>

    <main class="min-h-screen flex items-center justify-center p-6 py-32 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-full pointer-events-none">
            <div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-neon-emerald/10 blur-[120px] rounded-full"></div>
            <div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-neon-blue/10 blur-[120px] rounded-full"></div>
        </div>

        <div class="max-w-lg w-full relative z-10 reveal active">
            <div class="text-center mb-8">
                <a href="index.html" class="inline-flex items-center mb-4 group cursor-pointer">
                    <i class="fa-solid fa-shield-halved text-neon-emerald text-3xl mr-2 group-hover:rotate-12 transition-transform"></i>
                    <span class="font-bold text-2xl tracking-tight text-white">Fire<span class="text-neon-emerald">Audit</span></span>
                </a>
                <h1 class="text-2xl font-bold text-white">Create Your Security Account</h1>
                <p class="text-gray-400 mt-2">Join the elite developers securing their Firebase apps.</p>
            </div>

            <div class="glass-card p-8 rounded-2xl border border-white/10 shadow-2xl">
                <form id="registerForm" class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">First Name</label>
                        <input type="text" required class="w-full bg-[#0c0c14] border border-white/10 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-neon-emerald transition-all" placeholder="John">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Last Name</label>
                        <input type="text" required class="w-full bg-[#0c0c14] border border-white/10 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-neon-emerald transition-all" placeholder="Doe">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Work Email</label>
                        <input type="email" required class="w-full bg-[#0c0c14] border border-white/10 rounded-lg px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-neon-emerald transition-all" placeholder="name@company.com">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
                        <div class="relative">
                            <input type="password" id="password" required class="w-full bg-[#0c0c14] border border-white/10 rounded-lg px-4 pr-12 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-neon-emerald transition-all" placeholder="••••••••">
                            <button type="button" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-500 hover:text-white transition-colors togglePassword">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <div class="flex space-x-1 mt-2">
                            <div class="h-1 flex-1 rounded bg-neon-emerald"></div>
                            <div class="h-1 flex-1 rounded bg-neon-emerald"></div>
                            <div class="h-1 flex-1 rounded bg-white/10"></div>
                            <div class="h-1 flex-1 rounded bg-white/10"></div>
                        </div>
                        <p class="text-[10px] text-gray-500 mt-1 uppercase tracking-wider">Strength: Moderate</p>
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox" required class="w-4 h-4 bg-dark-bg border-white/10 rounded text-neon-emerald focus:ring-neon-emerald focus:ring-offset-dark-bg">
                        <label class="ms-2 text-xs text-gray-400">I agree to the <a href="#" class="text-neon-blue hover:underline">Terms of Service</a> and <a href="#" class="text-neon-blue hover:underline">Security Policy</a>.</label>
                    </div>

                    <button type="submit" class="w-full bg-neon-emerald text-black font-bold py-3 rounded-lg hover:bg-white transition-all shadow-[0_0_20px_rgba(0,255,102,0.3)]">
                        Create Account <i class="fa-solid fa-user-plus ms-2"></i>
                    </button>
                </form>

                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
                    <div class="relative flex justify-center text-xs uppercase"><span class="bg-dark-surface px-4 text-gray-500">Or register with</span></div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button class="flex items-center justify-center space-x-2 bg-white/5 border border-white/10 py-2.5 rounded-lg text-sm text-gray-300 hover:bg-white/10 transition-all">
                        <i class="fa-brands fa-google"></i><span>Google</span>
                    </button>
                    <button class="flex items-center justify-center space-x-2 bg-white/5 border border-white/10 py-2.5 rounded-lg text-sm text-gray-300 hover:bg-white/10 transition-all">
                        <i class="fa-brands fa-github"></i><span>GitHub</span>
                    </button>
                </div>
            </div>

            <p class="text-center text-gray-500 text-sm mt-8">
                Already have an account? <a href="login.html" class="text-neon-blue font-semibold hover:underline">Login here</a>
            </p>
        </div>
    </main>


    <script src="js/main.js"></script>
    <script>
        document.querySelectorAll('.togglePassword').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.querySelector('i').classList.toggle('fa-eye');
                this.querySelector('i').classList.toggle('fa-eye-slash');
            });
        });
    </script>
</body>
</html>
